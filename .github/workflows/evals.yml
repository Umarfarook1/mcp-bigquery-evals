name: Evals

on:
  push:
    branches: [main]
  workflow_dispatch:  # manual trigger from GitHub UI

jobs:
  run-evals:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed to push the badge update back to main
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Set up GCP credentials
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          if [ -z "$GCP_SA_KEY" ]; then
            echo "::warning::GCP_SA_KEY secret is not set; skipping evals run"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          mkdir -p ~/.config/gcloud
          echo "$GCP_SA_KEY" > ~/.config/gcloud/sa.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=$HOME/.config/gcloud/sa.json" >> "$GITHUB_ENV"
        id: gcp_setup

      - name: Run evals
        if: steps.gcp_setup.outputs.skip != 'true'
        env:
          BIGQUERY_PROJECT: ${{ secrets.BIGQUERY_PROJECT }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$BIGQUERY_PROJECT" ] || [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "::warning::BIGQUERY_PROJECT or ANTHROPIC_API_KEY missing; skipping evals run"
            exit 0
          fi
          mkdir -p evals
          mcp-bigquery-evals evals run \
            --model claude-haiku-4-5 \
            --golden src/mcp_bigquery_evals/evals/golden.yaml \
            --report evals/latest.json

      - name: Commit updated badge
        if: steps.gcp_setup.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ ! -f evals/badge.json ]; then
            echo "No badge to commit (eval run was skipped or failed silently)"
            exit 0
          fi
          if git diff --quiet evals/badge.json 2>/dev/null; then
            echo "Badge unchanged; nothing to commit."
          else
            git add evals/badge.json evals/latest.json
            git commit -m "evals: update badge from CI run [skip ci]"
            git push
          fi
